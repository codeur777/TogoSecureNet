services:

  # ── PostgreSQL + pgvector ──────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg14
    container_name: tsg_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: togo_securenet
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d togo_securenet"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G # Limite la casse sur votre RAM

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: tsg_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

# ── EMQX (MQTT broker) ────────────────────────────────────────────────────
  emqx:
    image: emqx/emqx:5.1.0
    container_name: tsg_emqx
    restart: unless-stopped
    ports:
      - "1884:1883"   # MQTT 
      - "8085:8083"   # WebSocket
      - "8086:8084"   # WebSocket SSL
      - "18084:18083" # Dashboard EMQX
    environment:
      EMQX_NAME: emqx
      EMQX_HOST: 127.0.0.1
    # Test de santé officiel et robuste utilisant l'API d'EMQX
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:18083/status"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

# ── Backend FastAPI ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./BACKEND
      dockerfile: Dockerfile
    container_name: tsg_backend
    restart: unless-stopped
    env_file:
      - ./BACKEND/.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      emqx:
        condition: service_started # Attend que le port MQTT 1883 soit ouvert
    environment:
      DATABASE_URL: postgresql://admin:postgres@postgres:5432/togo_securenet
      REDIS_URL: redis://redis:6379
      MQTT_BROKER: emqx
      MQTT_PORT: 1883
      SECRET_KEY: your_super_secret_key_change_me
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      ADMIN_EMAIL: admin@togosecurenet.tg
      ADMIN_PASSWORD: admin123
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: walterfalisco@gmail.com
      SMTP_PASSWORD: jhpktzvxzhuacuho
      SMTP_FROM: walterfalisco@gmail.com
    volumes:
      - ./BACKEND:/app
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Frontend Vite/React ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./FRONTEND_WEB/frontend
      dockerfile: Dockerfile
    container_name: tsg_frontend
    restart: unless-stopped
    ports:
      - "5174:5174"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./FRONTEND_WEB/frontend:/app
      - /app/node_modules # Protège les modules node du conteneur
    # Ajout d'un système de build plus léger en ressource si nécessaire
    deploy:
      resources:
        limits:
          memory: 1.5G

volumes:
  postgres_data: