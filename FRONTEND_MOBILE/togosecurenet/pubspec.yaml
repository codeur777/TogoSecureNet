name: togosecurenet
description: "TOGO-SecureNet Mobile App - Application mobile pour les forces de sécurité"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  json_annotation: ^4.11.0
  freezed_annotation: ^3.1.0

  # Navigation
  go_router: ^17.3.0

  # Network
  dio: ^5.5.0+1
  pretty_dio_logger: ^1.4.0

  # Local Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^10.3.1

  # Maps
  google_maps_flutter: ^2.7.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  url_launcher: ^6.3.0

  # Push Notifications
  onesignal_flutter: ^5.2.0

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  flutter_animate: ^4.5.0

  # Utils
  intl: ^0.20.2
  timeago: ^3.6.1
  uuid: ^4.4.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.3
  build_runner: ^2.4.12
  riverpod_lint: ^3.1.3
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.3.10
  json_serializable: ^6.8.0
  freezed: ^3.2.5

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo_emble.jpeg"
  adaptive_icon_background: "#16A34A"
  adaptive_icon_foreground: "assets/images/logo_emble.jpeg"

flutter_native_splash:
  color: "#16A34A"
  image: assets/images/logo_emble.jpeg
  android: true
  ios: true
  android_12:
    color: "#16A34A"
    image: assets/images/logo_emble.jpeg

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/

  fonts:
    - family: Inter
      fonts:
        - asset: fonts/Inter_18pt-Regular.ttf
          weight: 400
        - asset: fonts/Inter_18pt-Medium.ttf
          weight: 500
        - asset: fonts/Inter_18pt-SemiBold.ttf
          weight: 600
        - asset: fonts/Inter_18pt-Bold.ttf
          weight: 700
